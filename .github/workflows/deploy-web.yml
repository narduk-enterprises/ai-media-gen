name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        working-directory: apps/web
        run: pnpm run build
        env:
          NUXT_SITE_URL: https://ai-media-gen.nard.uk

      - name: Set secrets & deploy
        working-directory: apps/web
        run: |
          echo "$RUNPOD_API_KEY" | npx wrangler secret put RUNPOD_API_KEY --name ai-media-gen
          echo "$WEBHOOK_SECRET" | npx wrangler secret put WEBHOOK_SECRET --name ai-media-gen
          npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_WORKER_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
