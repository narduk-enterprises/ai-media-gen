name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: 'web/package-lock.json'

      - name: Cache node_modules
        uses: actions/cache@v4
        id: npm-cache
        with:
          path: web/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('web/package-lock.json') }}

      - name: Cache Nuxt build
        uses: actions/cache@v4
        with:
          path: web/.nuxt
          key: ${{ runner.os }}-nuxt-${{ hashFiles('web/package-lock.json', 'web/nuxt.config.ts') }}
          restore-keys: |
            ${{ runner.os }}-nuxt-

      - name: Install dependencies
        if: steps.npm-cache.outputs.cache-hit != 'true'
        working-directory: web
        run: npm ci

      - name: Deploy app
        working-directory: web
        run: npm run build && echo "$RUNPOD_API_KEY" | npx wrangler secret put RUNPOD_API_KEY --name ai-media-gen && echo "$WEBHOOK_SECRET" | npx wrangler secret put WEBHOOK_SECRET --name ai-media-gen && npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_WORKER_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          SITE_URL: https://ai-media-gen.narduk.workers.dev
