name: Deploy to GPU Pods

on:
  push:
    branches: [main]
    paths:
      - 'pod/**'

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Discover running pods
        id: discover
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
        run: |
          # Query RunPod GraphQL API for all running pods
          RESPONSE=$(curl -sf https://api.runpod.io/graphql \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $RUNPOD_API_KEY" \
            -d '{"query":"{ myself { pods { id name desiredStatus } } }"}')

          PODS=$(echo "$RESPONSE" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          pods = data.get('data',{}).get('myself',{}).get('pods',[])
          for pod in pods:
              if pod.get('desiredStatus') == 'RUNNING':
                  print(f\"{pod['id']}|{pod['name']}\")
          ")

          if [ -z "$PODS" ]; then
            echo "⏭️ No running pods found"
            echo "count=0" >> $GITHUB_OUTPUT
          else
            COUNT=$(echo "$PODS" | wc -l | tr -d ' ')
            echo "Found $COUNT running pod(s):"
            echo "$PODS" | while IFS='|' read -r id name; do
              echo "  • $name ($id)"
            done
            echo "pods<<EOF" >> $GITHUB_OUTPUT
            echo "$PODS" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            echo "count=$COUNT" >> $GITHUB_OUTPUT
          fi

      - name: Update all pods via API
        if: steps.discover.outputs.count != '0'
        run: |
          SUCCESS=0
          FAILED=0

          echo "${{ steps.discover.outputs.pods }}" | while IFS='|' read -r POD_ID POD_NAME; do
            [ -z "$POD_ID" ] && continue
            POD_URL="https://${POD_ID}-8188.proxy.runpod.net"

            echo ""
            echo "═══════════════════════════════════════════"
            echo "📦 Updating: $POD_NAME ($POD_ID)"
            echo "   URL: $POD_URL"
            echo "═══════════════════════════════════════════"

            # Try the /run-command endpoint to git pull & restart
            UPDATE_SCRIPT="cd /workspace/_repo && git pull --ff-only && cp pod/admin/server.py /workspace/admin/server.py && cp pod/admin/workflow_loader.py /workspace/admin/workflow_loader.py && cp pod/admin/workflows/* /workspace/admin/workflows/ && cp pod/scripts/manage-pod.sh /workspace/manage.sh 2>/dev/null; fuser -k 8188/tcp 2>/dev/null; sleep 2; cd /workspace/admin && COMFY_PORT=8189 ADMIN_PORT=8188 setsid python3 -u server.py > /workspace/admin.log 2>&1 < /dev/null &"

            RESULT=$(curl -sf -m 60 "${POD_URL}/run-command" \
              -H "Content-Type: application/json" \
              -d "{\"command\": \"$UPDATE_SCRIPT\", \"background\": false}" 2>&1) && {
              EXIT_CODE=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin).get('exit_code','?'))" 2>/dev/null || echo "?")
              if [ "$EXIT_CODE" = "0" ]; then
                echo "  ✅ Updated successfully"
                SUCCESS=$((SUCCESS + 1))
              else
                echo "  ⚠️ Update returned exit code: $EXIT_CODE"
                echo "  Output: $(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin).get('stdout','')[:500])" 2>/dev/null || echo "$RESULT")"
                FAILED=$((FAILED + 1))
              fi
            } || {
              echo "  ⚠️ /run-command not available — trying health check..."
              # At least verify the pod is reachable
              curl -sf -m 10 "${POD_URL}/health" > /dev/null 2>&1 \
                && echo "  ℹ️ Pod healthy but /run-command not available. Use the app's Pods page to update." \
                || echo "  ❌ Pod not reachable at $POD_URL"
              FAILED=$((FAILED + 1))
            }
          done

          echo ""
          echo "════════════════════════"
          echo "📊 Deploy complete"
          echo "════════════════════════"

      - name: No pods running
        if: steps.discover.outputs.count == '0'
        run: echo "⏭️ No running pods found — nothing to deploy"
